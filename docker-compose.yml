name: idig-server
services:
# Go application service
  idig-server:
    container_name: idig-server
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${IDIG_SERVER_PORT:-9000}:9000"
    environment:
      # Path inside the container; matches the volume mount below.
      IDIG_SERVER_DIR: /data
      PROJECT_NAME:    ${PROJECT_NAME}
      ADMIN_USER:      ${ADMIN_USER}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD}
      # Webhook to the IKAROS bridge (api/idig-sync). Leave both unset
      # to disable; see src/webhook.go.
      IDIG_WEBHOOK_URL:    ${IDIG_WEBHOOK_URL}
      IDIG_WEBHOOK_SECRET: ${IDIG_WEBHOOK_SECRET}
    volumes:
      - ${IDIG_DATA_DIR:-./data}:/data